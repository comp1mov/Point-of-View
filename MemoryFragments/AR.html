        if (helpDebugToggleEl) {
            updateDebugHelpUI();
            helpDebugToggleEl.addEventListener('click', () => {
                debugUiState.expanded = !debugUiState.expanded;
                updateDebugHelpUI();
            });
        }

        // Info section toggle
        const helpInfoToggle = document.getElementById('help-info-toggle');
        const helpInfoContent = document.getElementById('help-info-content');
        if (helpInfoToggle && helpInfoContent) {
            helpInfoToggle.addEventListener('click', () => {
                const open = helpInfoContent.style.display === 'none';
                helpInfoContent.style.display = open ? 'block' : 'none';
                helpInfoToggle.style.borderColor = open ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.15)';
                helpInfoToggle.style.color = open ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.5)';
            });
        }

        // Controls section toggle
        const helpControlsToggle = document.getElementById('help-controls-toggle');
        const helpControlsContent = document.getElementById('help-controls-content');
        if (helpControlsToggle && helpControlsContent) {
            helpControlsToggle.addEventListener('click', () => {
                const open = helpControlsContent.style.display === 'none';
                helpControlsContent.style.display = open ? 'block' : 'none';
                helpControlsToggle.style.borderColor = open ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.15)';
                helpControlsToggle.style.color = open ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.5)';
            });
        }

        if (helpLiteToggleEl) {
            updateLiteHelpUI();
            helpLiteToggleEl.addEventListener('click', () => {
                applyLiteMode(!liteState.enabled);
            });
        }

        // Stage System (parameter morphing)
        const runtimeRotationSpeed = {
            x: (CONFIG.cloudRotationSpeed && typeof CONFIG.cloudRotationSpeed.x === 'number') ? CONFIG.cloudRotationSpeed.x : 0,
            y: (CONFIG.cloudRotationSpeed && typeof CONFIG.cloudRotationSpeed.y === 'number') ? CONFIG.cloudRotationSpeed.y : 0,
            z: (CONFIG.cloudRotationSpeed && typeof CONFIG.cloudRotationSpeed.z === 'number') ? CONFIG.cloudRotationSpeed.z : 0
        };

        const stageRuntime = {
            active: false,
            patternIndex: 0,
            cycle: 0,
            stageId: 0,
            stageStart: 0,
            transitionStart: 0,
            inTransition: false,
            durationSec: 0,
            from: null,
            to: null
        };

        function axisStringToInt(axis) {
            if (axis === 'x') return 0;
            if (axis === 'y') return 1;
            if (axis === 'z') return 2;
            return 1;
        }

        function randomSeed3() {
            return [Math.random() * 100, Math.random() * 100, Math.random() * 100];
        }

        function applyRandomSeedIfNeeded(stageId, params) {
            const s = (CONFIG.stages && CONFIG.stages[stageId]) ? CONFIG.stages[stageId] : null;
            const n = (s && s.noise) ? s.noise : null;
            if (n && n.randomizeSeedOnEnter) {
                params.noiseSeed = randomSeed3();
            }
        }

        function getStageParams(stageId) {
            const s = (CONFIG.stages && CONFIG.stages[stageId]) ? CONFIG.stages[stageId] : null;
            if (!s) {
                return { rotationSpeed: { x: 0, y: 0, z: 0 }, twistEnabled: false, twistAmountDeg: 0, twistAxis: 'y' };
            }
            const rot = s.rotationSpeed || { x: 0, y: 0, z: 0 };
            const tw = s.twist || { enabled: false, amount: 0, axis: 'y' };
            const nz = s.noise || { enabled: false, amp: 0.0, scale: 0.25, speed: 0.06, seed: [0,0,0], randomizeSeedOnEnter: false };
            const seedArr = Array.isArray(nz.seed) ? nz.seed : [0,0,0];
            return {
                rotationSpeed: { x: rot.x || 0, y: rot.y || 0, z: rot.z || 0 },
                twistEnabled: !!tw.enabled,
                twistAmountDeg: (typeof tw.amount === 'number') ? tw.amount : 0,
                twistSpinDegPerSec: (typeof tw.spinDegPerSec === 'number') ? tw.spinDegPerSec : 0,
                twistAxis: tw.axis || 'y',
                noiseEnabled: !!nz.enabled,
                noiseAmp: (typeof nz.amp === 'number') ? nz.amp : 0.0,
                noiseScale: (typeof nz.scale === 'number') ? nz.scale : 0.25,
                noiseSpeed: (typeof nz.speed === 'number') ? nz.speed : 0.06,
                noiseSeed: [seedArr[0] || 0, seedArr[1] || 0, seedArr[2] || 0]
            };
        }

        function lerp(a, b, t) { return a + (b - a) * t; }
        function smoothstep(t) { return t * t * (3 - 2 * t); }

        function applyStageParams(params) {
            runtimeRotationSpeed.x = params.rotationSpeed.x;
            runtimeRotationSpeed.y = params.rotationSpeed.y;
            runtimeRotationSpeed.z = params.rotationSpeed.z;

            if (window.pointCloudMaterial) {
                const mat = window.pointCloudMaterial;
                const amountRad = ((liteState && liteState.enabled) ? 0 : (params.twistEnabled ? params.twistAmountDeg : 0)) * Math.PI / 180;
                const spinRad = ((liteState && liteState.enabled) ? 0 : (params.twistEnabled && typeof params.twistSpinDegPerSec === 'number' ? params.twistSpinDegPerSec : 0)) * Math.PI / 180;
                if (mat.uniforms.introTwistAmount) mat.uniforms.introTwistAmount.value = amountRad;
                if (mat.uniforms.introTwistSpinSpeed) mat.uniforms.introTwistSpinSpeed.value = spinRad;
                if (mat.uniforms.introTwistAxis) mat.uniforms.introTwistAxis.value = axisStringToInt(params.twistAxis);

                // Noise (cheap trig)
                const nAmp = ((liteState && liteState.enabled) ? 0 : (params.noiseEnabled ? params.noiseAmp : 0));
                if (mat.uniforms.noiseAmp) mat.uniforms.noiseAmp.value = nAmp;
                if (mat.uniforms.noiseScale) mat.uniforms.noiseScale.value = params.noiseScale;
                if (mat.uniforms.noiseSpeed) mat.uniforms.noiseSpeed.value = params.noiseSpeed;
                if (mat.uniforms.noiseSeed && params.noiseSeed) mat.uniforms.noiseSeed.value.set(params.noiseSeed[0], params.noiseSeed[1], params.noiseSeed[2]);
            }
        }

        function startStageSystem() {
            if (!CONFIG.stageSystem || !CONFIG.stageSystem.enabled) return;
            stageRuntime.active = true;
            stageRuntime.patternIndex = 0;
            stageRuntime.cycle = 0;
            const pattern = (CONFIG.stageSystem.pattern && CONFIG.stageSystem.pattern.length) ? CONFIG.stageSystem.pattern : [1];
            stageRuntime.stageId = pattern[0];
            stageRuntime.stageStart = performance.now();
            stageRuntime.transitionStart = stageRuntime.stageStart;
            stageRuntime.inTransition = false;
            stageRuntime.durationSec = (CONFIG.stageSystem.baseDurationSeconds || 120);
            stageRuntime.from = getStageParams(stageRuntime.stageId);
            stageRuntime.to = getStageParams(stageRuntime.stageId);
            applyRandomSeedIfNeeded(stageRuntime.stageId, stageRuntime.to);
            // keep first frame stable (from = to)
            stageRuntime.from.noiseSeed = stageRuntime.to.noiseSeed;
            applyStageParams(stageRuntime.to);
        }

        function advanceStage(now) {
            const pattern = (CONFIG.stageSystem && CONFIG.stageSystem.pattern && CONFIG.stageSystem.pattern.length) ? CONFIG.stageSystem.pattern : [1];
            stageRuntime.patternIndex += 1;
            if (stageRuntime.patternIndex >= pattern.length) {
                stageRuntime.patternIndex = 0;
                stageRuntime.cycle += 1;
            }
            const nextId = pattern[stageRuntime.patternIndex];
            stageRuntime.from = stageRuntime.to;
            stageRuntime.to = getStageParams(nextId);
            applyRandomSeedIfNeeded(nextId, stageRuntime.to);
            stageRuntime.stageId = nextId;
            stageRuntime.stageStart = now;
            const base = CONFIG.stageSystem.baseDurationSeconds || 120;
            const growth = (typeof CONFIG.stageSystem.durationGrowth === 'number') ? CONFIG.stageSystem.durationGrowth : 1.0;
            stageRuntime.durationSec = base * Math.pow(growth, stageRuntime.cycle);
            stageRuntime.transitionStart = now;
            stageRuntime.inTransition = true;
        }

        function updateStageSystem(now) {
            if (!stageRuntime.active) return;

            const forced = (CONFIG.stageSystem && CONFIG.stageSystem.debugForceStage) ? CONFIG.stageSystem.debugForceStage : 0;
            if (forced && forced > 0) {
                applyStageParams(getStageParams(forced));
                return;
            }

            const elapsedSec = (now - stageRuntime.stageStart) / 1000;
            if (elapsedSec >= stageRuntime.durationSec) {
                advanceStage(now);
            }

            if (stageRuntime.inTransition) {
                const trans = Math.max(0.01, CONFIG.stageSystem.transitionSeconds || 3.0);
                const tt = Math.min(1, (now - stageRuntime.transitionStart) / 1000 / trans);
                const e = smoothstep(tt);
                const a = stageRuntime.from;
                const b = stageRuntime.to;

                const aTw = a.twistEnabled ? a.twistAmountDeg : 0;
                const bTw = b.twistEnabled ? b.twistAmountDeg : 0;
                const aSpin = (a.twistEnabled && typeof a.twistSpinDegPerSec === 'number') ? a.twistSpinDegPerSec : 0;
                const bSpin = (b.twistEnabled && typeof b.twistSpinDegPerSec === 'number') ? b.twistSpinDegPerSec : 0;
                const aNz = a.noiseEnabled ? a.noiseAmp : 0;
                const bNz = b.noiseEnabled ? b.noiseAmp : 0;

                const mixed = {
                    rotationSpeed: {
                        x: lerp(a.rotationSpeed.x, b.rotationSpeed.x, e),
                        y: lerp(a.rotationSpeed.y, b.rotationSpeed.y, e),
                        z: lerp(a.rotationSpeed.z, b.rotationSpeed.z, e)
                    },
                    twistEnabled: (tt < 1) ? (a.twistEnabled || b.twistEnabled) : b.twistEnabled,
                    twistAmountDeg: lerp(aTw, bTw, e),
                    twistSpinDegPerSec: lerp(aSpin, bSpin, e),
                    twistAxis: (tt < 0.5) ? a.twistAxis : b.twistAxis,
                    noiseEnabled: (tt < 1) ? (a.noiseEnabled || b.noiseEnabled) : b.noiseEnabled,
                    noiseAmp: lerp(aNz, bNz, e),
                    noiseScale: lerp(a.noiseScale, b.noiseScale, e),
                    noiseSpeed: lerp(a.noiseSpeed, b.noiseSpeed, e),
                    noiseSeed: (
                        a.noiseEnabled && b.noiseEnabled
                            ? [
                                lerp(a.noiseSeed[0], b.noiseSeed[0], e),
                                lerp(a.noiseSeed[1], b.noiseSeed[1], e),
                                lerp(a.noiseSeed[2], b.noiseSeed[2], e)
                              ]
                            : (
                                a.noiseEnabled
                                    ? [a.noiseSeed[0], a.noiseSeed[1], a.noiseSeed[2]]
                                    : (
                                        b.noiseEnabled
                                            ? [b.noiseSeed[0], b.noiseSeed[1], b.noiseSeed[2]]
                                            : [0, 0, 0]
                                      )
                              )
                    )
                };
                applyStageParams(mixed);

                if (tt >= 1) stageRuntime.inTransition = false;
            } else {
                applyStageParams(stageRuntime.to);
            }
        }

        // Debug: force stage with keys Q/W/E, 0 for auto
        window.addEventListener('keydown', (e) => {
            if (!CONFIG.stageSystem) return;
            if (e.key === '0') CONFIG.stageSystem.debugForceStage = 0;
            if (e.key === 'q' || e.key === 'Q') CONFIG.stageSystem.debugForceStage = 1;
            if (e.key === 'w' || e.key === 'W') CONFIG.stageSystem.debugForceStage = 2;
            if (e.key === 'e' || e.key === 'E') CONFIG.stageSystem.debugForceStage = 3;
        });




        
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            const nowT = performance.now();
            if (window.pointCloudMaterial && window.pointCloudMaterial.uniforms && window.pointCloudMaterial.uniforms.timeSeconds) {
                window.pointCloudMaterial.uniforms.timeSeconds.value = nowT / 1000.0;
            }
            _fpsAcc += deltaTime;
            _fpsFrames += 1;
            if (nowT - _fpsLastT >= 800) {
                const secs = Math.max(1e-6, _fpsAcc);
                _fpsAvg = _fpsFrames / secs;
                _fpsAcc = 0;
                _fpsFrames = 0;
                _fpsLastT = nowT;
                if (helpFpsEl) helpFpsEl.textContent = 'fps avg: ' + _fpsAvg.toFixed(1);
            }


            // Stage system update
            if (stageRuntime.active) {
                updateStageSystem(nowT);
            }
            if (helpStageEl) {
                helpStageEl.textContent = stageRuntime.active ? ('stage: ' + stageRuntime.stageId) : '';
            }
            if (helpNoiseEl && window.pointCloudMaterial && window.pointCloudMaterial.uniforms && window.pointCloudMaterial.uniforms.noiseAmp) {
                const a = window.pointCloudMaterial.uniforms.noiseAmp.value;
                const sc = window.pointCloudMaterial.uniforms.noiseScale.value;
                const sp = window.pointCloudMaterial.uniforms.noiseSpeed.value;
                helpNoiseEl.textContent = (a && a !== 0) ? ('noise: on | amp: ' + a.toFixed(4) + ' | scale: ' + sc.toFixed(3) + ' | speed: ' + sp.toFixed(3)) : 'noise: off';
            }


            // Audio reactive update
            if (audioState.enabled) {
                const lvl = sampleAudioLevel();
                audioState.level = lvl;

                if (window.pointCloudMaterial && window.pointCloudMaterial.uniforms.audioLevel) {
                    const gainMul = (CONFIG.audioReactive && typeof CONFIG.audioReactive.sensitivity === 'number')
                        ? CONFIG.audioReactive.sensitivity : 1.0;
                    window.pointCloudMaterial.uniforms.audioLevel.value = Math.min(1.0, lvl * gainMul);
                }

                // Push frequency bands to shader (gain = effect multiplier)
                if (window.pointCloudMaterial &&
                    window.pointCloudMaterial.uniforms.audioBands &&
                    window.pointCloudMaterial.uniforms.audioBands.value &&
                    audioState.bands) {

                    const gain = (CONFIG.audioReactive && typeof CONFIG.audioReactive.sensitivity === 'number')
                        ? CONFIG.audioReactive.sensitivity : 1.0;
                    const dst = window.pointCloudMaterial.uniforms.audioBands.value;
                    const src = audioState.bands;
                    const len = Math.min(dst.length, src.length);
                    for (let i = 0; i < len; i++) {
                        dst[i] = Math.min(1.0, src[i] * gain);
                    }
                }

                // ======= SCAN UNIFORMS =======
                if (window.pointCloudMaterial && window.pointCloudMaterial.uniforms.scan1Pos) {
                    const u = window.pointCloudMaterial.uniforms;
                    const d = audioDrivers;
                    const fx = window.audioFxState || {};

                    // SCAN 1: delta-based, visible when moving, axis every 8th mid peak
                    // SCAN 1: appear at random pos, travel short distance, fade, pause, new axis
                    const eCfg = CONFIG.audioReactive.effects || {};
                    if (!window._scan1State) window._scan1State = { pos: 0, startPos: 0, vis: 0, phase: 'traveling', timer: 0, passCount: 0 };
                    const s1 = window._scan1State;
                    const travelLen = eCfg.scan1TravelLength || 0.3;
                    const pauseMs = eCfg.scan1PauseMs || 1500;

                    if (s1.phase === 'traveling') {
                        // Advance from mid
                        s1.pos += d.mid * (eCfg.scan1Speed || 0.002);
                        s1.vis = d.mid; // brightness = mid level
                        // Traveled enough?
                        if (s1.pos - s1.startPos >= travelLen || s1.pos >= 1.0) {
                            s1.phase = 'fading';
                        }
                    } else if (s1.phase === 'fading') {
                        s1.vis *= 0.92;
                        if (s1.vis < 0.01) {
                            s1.vis = 0;
                            s1.phase = 'paused';
                            s1.timer = pauseMs;
                        }
                    } else if (s1.phase === 'paused') {
                        s1.timer -= 16;
                        s1.vis = 0;
                        if (s1.timer <= 0) {
                            // New appearance: random position, maybe new axis
                            s1.startPos = Math.random() * (1.0 - travelLen);
                            s1.pos = s1.startPos;
                            s1.phase = 'traveling';
                            s1.passCount++;
                            if (s1.passCount % (eCfg.scan1AxisEveryN || 3) === 0) {
                                window._scan1Axis = ((window._scan1Axis || 0) + 1) % 3;
                            }
                        }
                    }
                    u.scan1Pos.value = fx.scan1 ? s1.pos : 0;
                    const s1minLvl = eCfg.scan1MinLevel || 0.2;
                    u.scan1Intensity.value = (fx.scan1 && s1.vis > s1minLvl) ? s1.vis : 0;

                    // SCAN 2: position accumulates from bass
                    if (!window._scan2State) window._scan2State = { pos: 0, axis: 1 };
                    const s2 = window._scan2State;
                    s2.pos += d.bass * (eCfg.scan2Speed || 0.002);
                    if (s2.pos >= 1.0) {
                        s2.pos -= 1.0;
                        s2.axis = (s2.axis + 1) % 3;
                    }
                    u.scan2Pos.value = fx.scan2 ? s2.pos : 0;
                    const s2minLvl = eCfg.scan2MinLevel || 0.15;
                    u.scan2Intensity.value = (fx.scan2 && d.energy > s2minLvl) ? d.energy : 0;
                    u.scan2Axis.value = s2.axis;

                    u.scan1Axis.value = window._scan1Axis || 0;

                    // PULSE: multiple overlapping waves
                    if (!window._pulseState) window._pulseState = {
                        waves: [{pos:0,str:0},{pos:0,str:0},{pos:0,str:0}],
                        nextWave: 0
                    };
                    const ps = window._pulseState;
                    const pMaxR = (u.cloudRadius ? u.cloudRadius.value : 1.0) * 1.2;
                    const pThresh = eCfg.pulseBassThreshold || 0.2;

                    // Advance all active waves
                    for (const w of ps.waves) {
                        if (w.str > 0) {
                            w.pos += (eCfg.pulseSpeed || 0.00005) * 60;
                            if (w.pos > pMaxR) { w.pos = 0; w.str = 0; }
                        }
                    }
                    // Spawn new wave when bass peaks
                    if (d.bass > pThresh) {
                        const slot = ps.waves[ps.nextWave];
                        if (slot.str === 0) {
                            slot.pos = 0.01;
                            slot.str = Math.min(1.0, d.bass);
                            ps.nextWave = (ps.nextWave + 1) % ps.waves.length;
                        }
                    }
                    // Send strongest wave (shader handles one at a time for now)
                    let bestW = ps.waves[0];
                    for (const w of ps.waves) { if (w.str > bestW.str) bestW = w; }
                    u.pulseWavePos.value = fx.pulse ? bestW.pos : 0;
                    u.pulseStrength.value = fx.pulse ? bestW.str : 0;

                    // FLICKER: 3 layers from different channels
                    if (!window._flickerState) window._flickerState = {
                        f1: { fade: 0, seed: 0, prev: 0, cooldown: 0, count: 0 },
                        f2: { fade: 0, seed: 0, prev: 0, cooldown: 0, count: 0 },
                        f3: { fade: 0, seed: 0, prev: 0, cooldown: 0, count: 0 }
                    };
                    const fls = window._flickerState;

                    function updateFlicker(fl, val, threshold, everyN, cooldownMs) {
                        fl.cooldown = Math.max(0, fl.cooldown - 16);
                        if (val < fl.prev && fl.prev > threshold && fl.cooldown <= 0) {
                            fl.count++;
                            if (fl.count % everyN === 0) {
                                fl.fade = 1.0;
                                fl.seed = Math.random() * 1000;
                                fl.cooldown = cooldownMs;
                            }
                        }
                        fl.prev = val;
                        fl.fade *= 0.97;
                        if (fl.fade < 0.01) fl.fade = 0;
                    }

                    // F1: bass peaks, every 8th
                    updateFlicker(fls.f1, d.bass, 0.15, 8, 500);
                    // F2: mid peaks, every 6th
                    updateFlicker(fls.f2, d.mid, 0.15, 6, 400);
                    // F3: high peaks, every 4th
                    updateFlicker(fls.f3, d.high, 0.10, 4, 300);

                    u.flickerSeed.value = fls.f1.seed;
                    u.flickerFade.value = fx.flicker1 ? fls.f1.fade : 0;
                    u.flicker2Seed.value = fls.f2.seed;
                    u.flicker2Fade.value = fx.flicker2 ? fls.f2.fade : 0;
                    u.flicker3Seed.value = fls.f3.seed;
                    u.flicker3Fade.value = fx.flicker3 ? fls.f3.fade : 0;
                }

                if (helpAudioLevelEl) {
                    helpAudioLevelEl.textContent = '';
                }

                // Mini spectrum analyzer — shows drivers
                const specCanvas = document.getElementById('help-audio-spectrum');
                if (specCanvas) {
                    specCanvas.style.display = 'block';
                    const ctx2d = specCanvas.getContext('2d');
                    const W = specCanvas.width;
                    const H = specCanvas.height;
                    ctx2d.clearRect(0, 0, W, H);

                    const d = audioDrivers;
                    const groups = [
                        { label: 'bass', val: d.bass, color: '255,80,80' },
                        { label: 'mid', val: d.mid, color: '255,180,60' },
                        { label: 'high', val: d.high, color: '100,200,255' },
                        { label: 'air', val: d.air, color: '180,140,255' },
                        { label: 'nrg', val: d.energy, color: '255,255,255' }
                    ];
                    const gap = 4;
                    const barW = (W * 0.65 - gap * (groups.length + 1)) / groups.length;

                    ctx2d.textAlign = 'center';
                    for (let i = 0; i < groups.length; i++) {
                        const g = groups[i];
                        const v = Math.min(1.0, g.val);
                        const barH = v * (H - 22);
                        const x = gap + i * (barW + gap);
                        ctx2d.fillStyle = 'rgba(' + g.color + ',' + (0.3 + v * 0.7).toFixed(2) + ')';
                        ctx2d.fillRect(Math.round(x), Math.round(H - 12 - barH), Math.round(barW), Math.round(barH));
                        ctx2d.fillStyle = 'rgba(255,255,255,0.6)';
                        ctx2d.font = '7px -apple-system, sans-serif';
                        ctx2d.fillText(v.toFixed(2), Math.round(x + barW / 2), Math.max(8, Math.round(H - 14 - barH)));
                        ctx2d.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx2d.font = '8px -apple-system, sans-serif';
                        ctx2d.fillText(g.label, Math.round(x + barW / 2), H - 2);
                    }

                    // Beat info on right side
                    const rx = W * 0.68;
                    ctx2d.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx2d.font = '9px -apple-system, sans-serif';
                    ctx2d.textAlign = 'left';
                    ctx2d.fillText('energy: ' + d.energy.toFixed(2), rx, 12);
                }
            } else {
                if (window.pointCloudMaterial && window.pointCloudMaterial.uniforms.audioLevel) {
                    window.pointCloudMaterial.uniforms.audioLevel.value = 0.0;
                }
                if (window.pointCloudMaterial &&
                    window.pointCloudMaterial.uniforms.audioBands &&
                    window.pointCloudMaterial.uniforms.audioBands.value) {

                    const dst = window.pointCloudMaterial.uniforms.audioBands.value;
                    for (let i = 0; i < dst.length; i++) {
                        dst[i] = 0;
                    }
                }
                if (helpAudioLevelEl) helpAudioLevelEl.textContent = '';
                const specCanvasOff = document.getElementById('help-audio-spectrum');
                if (specCanvasOff) specCanvasOff.style.display = 'none';
           }

            if (window.pointCloudMaterial) {
                window.pointCloudMaterial.uniforms.customCameraPos.value.copy(camera.position);
            }
            
            if (window.pointCloudMesh) {
                if (runtimeRotationSpeed.x !== 0) {
                    window.pointCloudMesh.rotation.x += runtimeRotationSpeed.x * deltaTime * Math.PI / 180;
                }
                if (runtimeRotationSpeed.y !== 0) {
                    window.pointCloudMesh.rotation.y += runtimeRotationSpeed.y * deltaTime * Math.PI / 180;
                }
                if (runtimeRotationSpeed.z !== 0) {
                    window.pointCloudMesh.rotation.z += runtimeRotationSpeed.z * deltaTime * Math.PI / 180;
                }
            }
            
            if (window.anchorMesh) {
                const now = performance.now();
                const idle = now - userActivity.lastTime > ANCHOR_FADE_DELAY;
                const inAutoMode = CAMSYS.autoMode || CAMSYS.inTransition;
                
                if (userActivity.active && !idle && !inAutoMode) {
                    // Fade in
                    userActivity.anchorOpacity = Math.min(CONFIG.anchorOpacity || 0.5, userActivity.anchorOpacity + 0.08);
                } else {
                    // Fade out
                    userActivity.anchorOpacity = Math.max(0, userActivity.anchorOpacity - ANCHOR_FADE_SPEED);
                    if (userActivity.anchorOpacity <= 0) userActivity.active = false;
                }
                
                const show = !!CONFIG.showAnchor && !(liteState && liteState.enabled && CONFIG.liteMode && CONFIG.liteMode.disableAnchor);
                window.anchorMesh.visible = show && userActivity.anchorOpacity > 0.001;
                
                // Update material opacity
                window.anchorMesh.children.forEach(child => {
                    if (child.material) child.material.opacity = userActivity.anchorOpacity;
                });
                
                window.anchorMesh.position.copy(controls.target);
            }

            // Camera system update (auto scenes + transitions)
            updateCameraSystem(performance.now());

            // Disable orbit controls during camera transitions
            controls.enabled = !(CAMSYS.inTransition);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Camera position copy on 'C' key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                const pos = camera.position;
                const target = controls.target;
                const configText = `cameraPosition: [${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}],\ncameraTarget: [${target.x.toFixed(2)}, ${target.y.toFixed(2)}, ${target.z.toFixed(2)}],`;
                
                navigator.clipboard.writeText(configText).then(() => {
                    console.log('%c📷 Camera copied to clipboard!', 'color: #4CAF50; font-size: 14px; font-weight: bold;');
                    console.log(configText);
                }).catch(() => {
                    console.log('%c📷 Camera position:', 'color: #4CAF50; font-size: 14px; font-weight: bold;');
                    console.log(configText);
                });
            }
        });
    </script>
</body>
