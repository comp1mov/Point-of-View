<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Spatial Memory Fragment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            opacity: 0;
            transition: opacity 450ms ease;
            cursor: crosshair;
        }
        
        #canvas-container.visible {
            opacity: 1;
        }

        #canvas-container canvas {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            cursor: crosshair;
        }




        /* Custom cursor that can fade (native cursor can't animate) */
        #canvas-container,
        #canvas-container canvas {
            cursor: none; /* hide system cursor so our cursor is the only one */
        }

        #soft-cursor {
            position: fixed;
            left: 0;
            top: 0;
            width: 14px;
            height: 14px;
            margin-left: -9px; /* center on pointer */
            margin-top: -9px;
            pointer-events: none;
            z-index: 99999;

            opacity: 0;
            transition: opacity 420ms ease;
            will-change: transform, opacity;
        }

        /* crosshair look */
        #soft-cursor::before,
        #soft-cursor::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            background: rgba(255,255,255,0.75);
            transform: translate(-50%, -50%);
        }

        #soft-cursor::before { width: 18px; height: 1px; }
        #soft-cursor::after  { width: 1px;  height: 18px; }

        #soft-cursor.visible {
            opacity: 1;
        }

@supports (padding: env(safe-area-inset-top)) {
            body {
                padding: 0 !important;
            }
            #canvas-container {
                width: 100vw;
                height: 100vh;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
        
        /* Loading Screen */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
            opacity: 1;
            transition: opacity 350ms ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 10000;
            color: #fff;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
        }
        
        #loading-overlay.fadeout {
            opacity: 0;
            pointer-events: none;
        }
        
        #loading-overlay.hidden {
            display: none;
        }

        #loading-enter-btn {
            margin-top: 24px;
            margin-bottom: 6px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 14px 52px;
            cursor: default;
            transition: all 0.6s ease;
            outline: none;
            align-self: flex-start;
        }
        #loading-enter-btn:disabled {
            cursor: default;
        }
        #loading-enter-btn.ready {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
            cursor: pointer;
            animation: btnPulseText 2.5s ease-in-out infinite, btnPulseBorder 2.5s ease-in-out infinite;
        }
        #loading-enter-btn.ready:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.05);
            animation: none;
        }
        @keyframes btnPulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1.0; }
        }
        @keyframes btnPulseBorder {
            0%, 100% { border-color: rgba(255,255,255,0.4); background: rgba(0,0,0,0); }
            50% { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
        }
.loading-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            max-width: 90vw;
        
            margin-top: clamp(72px, 16vh, 220px);
        }
        /* Loading layout v044 (stable lines, list-style) */
        #loading-tags { margin-bottom: 18px; }
        .loading-tag {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.75;
            line-height: 1.4;
            min-height: 18px;
            user-select: none;
        }
        #loading-scan { margin-bottom: 24px; }
        #loading-scan-title {
            font-size: 27px;
            line-height: 1.3;
            font-weight: 300;
            letter-spacing: 0.3px;
            min-height: 32px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #loading-scan-city {
            font-size: 21px;
            line-height: 1.3;
            opacity: 0.8;
            min-height: 24px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #loading-scan-extra {
            font-size: 21px;
            line-height: 1.3;
            opacity: 0.6;
            min-height: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .loading-line {
            min-height: 18px;
            line-height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #loading-status { margin-bottom: 26px; }
        #loading-progress-line {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.85;
        }
        #loading-transfer-line {
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0.75;
        }
        #loading-stage-line {
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0.55;
        }
        #loading-credits {
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0.45;
            line-height: 1.8;
        }
        
        /* Credits: make prefix smaller, keep left aligned across devices */
        #loading-credits { text-align: left; width: 100%; }
        #loading-credit-text .credits-prefix {
            font-size: inherit;
            opacity: 1;
            letter-spacing: 1px;
        }
        #loading-credit-text .credits-name {
            font-size: inherit;
            opacity: 1;
            letter-spacing: 1px;
        }

        /* Credits unified: two lines, same font */
        #loading-credit-text .credits-prefix,
        #loading-credit-text .credits-name {
            font-size: inherit;
            opacity: 1;
            letter-spacing: 1px;
            text-transform: none;
            line-height: 1.6;
        }
        #loading-credit-text .credits-line {
            font-size: inherit;
            opacity: 1;
            letter-spacing: 1px;
            line-height: 1.6;
            display: block;
        }

        /* Credits links: keep same typography, make clickable */
        #loading-credit-text a.credits-link {
            color: inherit;
            text-decoration: none;
            opacity: inherit;
            pointer-events: auto;
        }
        #loading-credit-text a.credits-link:hover { text-decoration: underline; }

        /* Help panel credits links */
        #help-credits a.help-link {
            color: inherit;
            text-decoration: none;
            pointer-events: auto;
        }
        #help-credits a.help-link:hover { text-decoration: underline; }

        /* Bottom corner credits links */
        #corner-heart .corner-line { display: block; }
        #corner-heart a.corner-link {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            pointer-events: auto;
        }
        #corner-heart a.corner-link:hover { text-decoration: underline; color: rgba(255,255,255,0.85); }

        /* Hide legacy clickable handle so typography stays consistent */
        #loading-credit-handle { display: none !important; }
#loading-credit-handle {
            color: #fff;
            text-decoration: none;
            opacity: 0.9;
            margin-left: 6px;
        }
        #loading-credit-handle:hover { text-decoration: underline; }

        
        #loading-title {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 30px;
            font-weight: 300;
            line-height: 1.6;
        }
        
        

        #loading-title-main,
        #loading-title-meta {
            display: block;
        }

        #loading-title-meta.hidden {
            display: none;
        }
#loading-description {
            margin-bottom: 40px;
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.8;
            font-weight: 300;
        }
        
        #loading-time {
            font-size: 14px;
            opacity: 0.7;
        }
        
        #loading-location {
            font-size: 16px;
            opacity: 0.9;
            margin: 4px 0;
        }
        
        #loading-place {
            font-size: 14px;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1.0; }
        }
        
        #loading-progress {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        #loading-credits-legacy {
            font-size: 14px;
            opacity: 0.6;
            line-height: 1.8;
            font-weight: 300;
            text-align: center;
        }

        #loading-credits-legacy a {
            color: #fff;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        #loading-credits-legacy a:hover {
            opacity: 1.0;
            animation: pulse 1.5s ease-in-out infinite;
        }
        

        /* iOS Safari: prevent auto-link styling/select */
        #loading-overlay, #loading-overlay * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #loading-title-meta {
            color: inherit;
        }

        #loading-source,
        #loading-file,
        #loading-substatus {
            font-size: 12px;
            opacity: 0.55;
            font-weight: 300;
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            max-width: 520px;
            min-height: 1.6em;
        }
#loading-source { margin-top: -30px; margin-bottom: 6px; }
        #loading-file { margin-bottom: 6px; }
        #loading-substatus { margin-bottom: 26px; letter-spacing: 1px; text-transform: uppercase; }

        /* Controls Hint - Compact Box */
        #controls-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(60px);
            padding: 0px 0px;
            border-radius: 2px;
            display: none;
            z-index: 9999;
            color: #fff;
            font-weight: 300;
            text-align: left;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        #controls-hint.show {
            display: block;
            opacity: 1;
        }
        
        #controls-hint.fade-out {
            opacity: 0;
        }
        
        .control-section {
            margin-bottom: 20px;
        }
        
        .control-section:last-child {
            margin-bottom: 0;
        }
        
        .control-title {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 1.0;
            font-weight: 400;
        }
        
        .control-inputs {
            font-size: 13px;
            opacity: 0.7;
            line-height: 1.6;
            padding-left: 12px;
        }
    

        /* Corner UI */
        #corner-heart {
            position: fixed;
            right: 14px;
            bottom: calc(14px + env(safe-area-inset-bottom, 0px));
            z-index: 30;
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            letter-spacing: 1px;
            user-select: none;
        }

        #corner-help {
            position: fixed;
            right: 14px;
            top: calc(14px + env(safe-area-inset-top, 0px));
            z-index: 31;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.35);
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            line-height: 26px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        #corner-help:hover { background: rgba(0,0,0,0.55); }
#corner-help:hover {
            opacity: 1.0;
        }


        #corner-strudel {
            position: fixed;
            right: 82px;
            top: calc(14px + env(safe-area-inset-top, 0px));
            z-index: 31;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.35);
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            line-height: 26px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        #corner-strudel:hover {
            background: rgba(255,255,255,0.12);
        }
        #corner-strudel.is-playing {
            border-color: rgba(255,255,255,0.55);
            background: rgba(255,255,255,0.10);
        }

        #corner-audio-reactive {
            position: fixed;
            right: 48px;
            top: calc(14px + env(safe-area-inset-top, 0px));
            z-index: 31;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.35);
            color: rgba(255,255,255,0.9);
            font-size: 15px;
            line-height: 26px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        #corner-audio-reactive:hover {
            background: rgba(255,255,255,0.12);
        }
        #corner-audio-reactive.is-active {
            border-color: rgba(100,255,160,0.65);
            background: rgba(100,255,160,0.10);
            color: rgba(100,255,160,0.9);
        }

        #strudel-panel {
            position: fixed;
            right: 12px;
            top: calc(52px + env(safe-area-inset-top, 0px));
            z-index: 34;
            width: min(520px, calc(100vw - 24px));
            height: min(420px, calc(70vh - 24px));
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow: hidden;
            display: none;
            flex-direction: column;
            box-shadow: 0 14px 45px rgba(0, 0, 0, 0.8);
        }
        #strudel-panel.show {
            display: flex;
        }
        #strudel-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.20);
            user-select: none;
        }
        #strudel-panel-title {
            font-size: 12px;
            letter-spacing: 0.4px;
            color: rgba(255,255,255,0.85);
        }
        #strudel-panel-header button {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(0,0,0,0.20);
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            line-height: 24px;
            cursor: pointer;
        }
        #strudel-panel-header button:hover {
            background: rgba(255,255,255,0.12);
        }
        #strudel-iframe {
            flex: 1;
            width: calc(100% + 17px);
            height: calc(100% + 17px);
            border: 0;
            background: rgba(0,0,0,0.15);
            margin-right: -17px;
            margin-bottom: -17px;
        }

        /* Audio Panel upgrades: draggable + resizable + minimal settings */
        #strudel-panel {
            resize: both;
            min-width: 320px;
            min-height: 240px;
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 24px);
        }
        #strudel-panel-header {
            cursor: move;
            touch-action: none;
        }
        #strudel-panel-toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            background: rgba(0,0,0,0.22);
        }
        #strudel-panel-toolbar.collapsed {
            display: none;
        }
        #strudel-url-input {
            flex: 1;
            height: 28px;
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(0,0,0,0.25);
            color: rgba(255,255,255,0.86);
            font-size: 12px;
            outline: none;
        }
        #strudel-url-input:focus {
            border-color: rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.35);
        }
        #strudel-load {
            height: 28px;
            padding: 0 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(0,0,0,0.20);
            color: rgba(255,255,255,0.9);
            font-size: 12px;
            cursor: pointer;
        }
        #strudel-load:hover {
            background: rgba(255,255,255,0.12);
        }

        /* Help Panel */
        #help-panel {
            position: fixed;
            right: 12px;
            top: calc(52px + env(safe-area-inset-top, 0px));
            width: min(420px, calc(100vw - 32px));
            max-height: calc(100vh - 80px);
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(60px);
            border-radius: 8px;
            padding: 14px 18px;
            z-index: 10000;
            color: #fff;
            display: none;
            box-shadow: 0 14px 45px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .help-header {
            touch-action: none;
        }


#help-panel, #loading-overlay, #corner-ui, #controls-hint {
            -webkit-tap-highlight-color: transparent;
        }
        #help-panel .help-scan {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #help-panel.show {
            display: block;
        }
        .help-body {
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            max-height: calc(100vh - 160px);
            overflow-y: auto;
        }

        .help-section {
            margin-bottom: 18px;
        }

        .help-section-title {
            font-size: 11px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            opacity: 0.75;
            margin-bottom: 6px;
        }

        .help-section-body {
            font-size: 13px;
            line-height: 1.5;
        }

        .help-version {
            margin-top: 10px;
            font-size: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .help-header {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .help-scan {
            min-width: 0;
        }
        #help-title-main {
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;

        }
        #help-title-meta {
            font-size: 12px;

        }
        #help-location, #help-place, #help-credits, #help-points {

            line-height: 1.35;
        }
        #help-credits {
            margin-top: 8px;
            opacity: 0.55;

            letter-spacing: 0.6px;

        }

        
        #help-device, #help-stage, #help-fps {

        }

        #help-debug-wrap {

        }
        #help-debug-toggle {

        #help-debug.collapsed {

        }



        #help-audio {
            margin-top: 6px;

            align-items: center;

            background: rgba(255,255,255,0.08);

            color: #fff;
            opacity: 0.9;

            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        #help-audio-toggle:hover { opacity: 1.0; }
        #help-audio-level { opacity: 0.8; }




#help-close {
            background: transparent;
            border: 0;
            color: #fff;
            opacity: 0.7;
            cursor: pointer;
            font-size: 16px;
            line-height: 16px;
            padding: 2px 6px;
            border-radius: 2px;
        }
        #help-close:hover {
            opacity: 1.0;
            background: rgba(255, 255, 255, 0.08);
        }

    
        
        /* Strudel controls inside Help panel */
        .help-strudel-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .help-strudel-row input[type="text"] {
            flex: 1 1 240px;
            min-width: 200px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.18);
            color: #fff;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            outline: none;
        }
        .help-strudel-row textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.18);
            color: #fff;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            line-height: 1.35;
            outline: none;
            margin-top: 8px;

        const DB_NAME = 'PointCloudCache';
        const DB_VERSION = 1;
        const STORE_NAME = 'plyFiles';

        class PLYCache {
            constructor() {
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'url' });
                        }
                    };
                });
            }

            async get(url) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(url);
                    request.onsuccess = () => resolve(request.result?.data);
                    request.onerror = () => reject(request.error);
                });
            }

            async set(url, data) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put({ url, data, timestamp: Date.now() });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        function formatBytes(bytes) {
            const b = Number(bytes || 0);
            if (!isFinite(b) || b <= 0) return '0 B';
            const units = ['B','KB','MB','GB'];
            const i = Math.min(units.length - 1, Math.floor(Math.log(b) / Math.log(1024)));
            const v = b / Math.pow(1024, i);
            const d = i === 0 ? 0 : (v < 10 ? 2 : (v < 100 ? 1 : 0));
            return v.toFixed(d) + ' ' + units[i];
        }

                // Accept plain hashes too, like "#..."
                if (url.startsWith('#')) return new URL(url, 'https://strudel.cc/').toString();
                return new URL(url, window.location.href).toString();
            } catch (e) {
                return url;
            }
        }

        function base64ToUtf8(b64) {
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        function decodeStrudelShareToCode(trackUrl) {
            try {
                const u = new URL(normalizeStrudelUrl(trackUrl));
                const hash = (u.hash || '').replace(/^#/, '');
                if (!hash) return '';
                const raw = decodeURIComponent(hash);
                // url-safe base64 support
                let b64 = raw.replace(/-/g, '+').replace(/_/g, '/').replace(/\s/g, '');
                const pad = b64.length % 4;
                if (pad) b64 += '='.repeat(4 - pad);
                return base64ToUtf8(b64);
            } catch (e) {
                console.warn('[Strudel] Failed to decode track URL', e);
                return '';
            }
        }


        function ensureStrudelAutoPlay(code) {
    const c = (code || '').trim();
    if (!c) return '';
    // If user already calls .play(), keep as is
    if (/\.\s*play\s*\(/.test(c)) return c;

    const lines = c.split('\n');
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    if (!lines.length) return c;

    const last = lines[lines.length - 1];
    const lastTrim = last.trim();

    // Multi-line chain: last line starts with a dot, so we can continue the chain.
    if (lastTrim.startsWith('.')) {
        lines.push('.play()');
        return lines.join('\n');
    }

    // Otherwise, append .play() to the last statement.
    lines[lines.length - 1] = last.replace(/\s*;?\s*$/, '') + '.play();';
    return lines.join('\n');
}

function exposeStrudelGlobals(apiObj) {
    try {
        const candidates = [];
        if (apiObj) candidates.push(apiObj);
        if (apiObj && apiObj.core) candidates.push(apiObj.core);
        if (apiObj && apiObj.ctx) candidates.push(apiObj.ctx);
        if (apiObj && apiObj.helpers) candidates.push(apiObj.helpers);

        for (const obj of candidates) {
            let cur = obj;
            let depth = 0;
            while (cur && depth < 3) {
                for (const k of Reflect.ownKeys(cur)) {
                    if (typeof k !== 'string') continue;
                    const v = cur[k];
                    if (typeof v === 'function' && typeof window[k] === 'undefined') {
                        window[k] = v;
                    }
                }
                cur = Object.getPrototypeOf(cur);
                depth++;
            }
        }
    } catch (e) {
        // no-op
    }
}

function getStrudelEvaluateFn(apiObj) {
    try {
        if (typeof window.evaluate === 'function') return window.evaluate;

        if (window.strudel && typeof window.strudel.evaluate === 'function') return window.strudel.evaluate.bind(window.strudel);
        if (apiObj && typeof apiObj.evaluate === 'function') return apiObj.evaluate.bind(apiObj);
        if (apiObj && apiObj.repl && typeof apiObj.repl.evaluate === 'function') return apiObj.repl.evaluate.bind(apiObj.repl);
    } catch (e) {

    }
    return null;
}

function stripMissingTempoFns(code) {

    if (/\bsetcps\s*\(/.test(out) && typeof window.setcps !== 'function') {

    }
    if (/\bsetcpm\s*\(/.test(out) && typeof window.setcpm !== 'function') {
        out = out.replace(/^\s*setcpm\s*\([^)]*\)\s*;?\s*\n?/gm, '');
    }
    return out;
}



function fixStrudelTonalScaleSyntax(code) {
    // Strudel tonal scales prefer ':' separators instead of spaces, e.g. "C:major".
    // Auto-fix old share links like .scale("G4 minor") -> .scale("G4:minor").
    let out = String(code || '');
    out = out.replace(/\.scale\s*\(\s*(['"])([^'"]+)\1\s*\)/g, (m, q, inner) => {
        const s = String(inner || '').trim();
        if (!s) return m;
        if (s.includes(':') || !s.includes(' ')) return m;
        const fixed = s.replace(/\s+/g, ':');
        return `.scale(${q}${fixed}${q})`;
    });
    return out;
}

function ensureStrudelAnalyze(code, analyserId) {
    const id = analyserId || 'pcv';
    let out = String(code || '');
    if (out.includes('.analyze(')) return out;

    // If code calls .play(), inject analyze right before it.
    out = out.replace(/\.play\s*\(/g, `.analyze(${JSON.stringify(id)}).play(`);

    if (!out.includes('.analyze(')) {
        // Common case: share links are a chain without .play().
        out = out.trimEnd() + `\n.analyze(${JSON.stringify(id)})\n`;
    }
    return out;
}

function extractStrudelSoundNames(code) {
    const out = new Set();
    const s = String(code || '');
    const reSound = /\.(?:s|sound)\s*\(\s*(['"])([^'"]+)\1\s*\)/g;
    let m;
    while ((m = reSound.exec(s))) out.add(m[2]);
    return Array.from(out);
}

function registerFallbackSoundsFromCode(code) {
    // Register a minimal synth fallback for known missing GM names (avoid overriding real packs).
    if (typeof window.registerSound !== 'function' || typeof window.getAudioContext !== 'function') return;

    const names = extractStrudelSoundNames(code);
    if (!names.includes('gm_lead_6_voice')) return;
    if (window.__pcvStrudelFallbackRegistered) return;

    try {
        window.registerSound('gm_lead_6_voice', (time, value, onended) => {
            const ctx = window.getAudioContext();
            const v = value || {};

            const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
            const clamp01 = (x) => clamp(x, 0, 1);

            const noteNameToMidi = (s) => {
                if (typeof s !== 'string') return null;
                const m = String(s).trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
                if (!m) return null;
                const letter = m[1].toUpperCase();
                const acc = m[2] || '';
                const oct = parseInt(m[3], 10);
                const base = ({ C:0, D:2, E:4, F:5, G:7, A:9, B:11 })[letter];
                let semi = base;
                if (acc === '#') semi += 1;
                if (acc === 'b') semi -= 1;
                semi = (semi + 12) % 12;
                // MIDI: C4 = 60
                return (oct + 1) * 12 + semi;
            };

            const midiToFreq = (midi) => 440 * Math.pow(2, (midi - 69) / 12);

            const resolveFreq = () => {
                const f = Number(v.freq ?? v.frequency);
                if (Number.isFinite(f) && f > 0) return f;

                const midi = Number(v.midi ?? v.midinote ?? v.noteNumber);
                if (Number.isFinite(midi)) {
                    if (midi > 200) return midi; // already Hz-ish
                    return midiToFreq(clamp(midi, 0, 127));
                }

                const note = v.note ?? v.n ?? v.pitch;
                if (typeof note === 'string') {
                    const mm = noteNameToMidi(note);
                    if (mm != null) return midiToFreq(clamp(mm, 0, 127));
                }
                if (typeof note === 'number' && Number.isFinite(note)) {
                    if (note > 200) return note;         // Hz
                    if (note >= 0 && note <= 127) return midiToFreq(note); // MIDI
                    // fallback: interpret as semitone offset around A4
                    return midiToFreq(69 + clamp(note, -48, 48));
                }

                return 440;
            };

            const resolveDur = () => {
                const d = Number(v.duration ?? v.dur ?? v.length ?? v.sustain);
                if (!Number.isFinite(d) || d <= 0) return 0.25;
                return clamp(d, 0.05, 8.0);
            };

            const resolveAmp = () => {
                const a = Number(v.gain ?? v.amp ?? v.volume ?? v.velocity ?? 1);
                if (!Number.isFinite(a)) return 0.9;
                return clamp01(a);
            };

            const resolveCutoffHz = () => {
                const c = Number(v.cutoff ?? v.lpf ?? v.filter);
                if (!Number.isFinite(c)) return 8000;
                if (c > 0 && c <= 1) return 200 + c * 12000;
                return clamp(c, 50, 20000);
            };

            const resolveQ = () => {
                const q = Number(v.q ?? v.res ?? v.resonance);
                if (!Number.isFinite(q)) return 0.8;
                return clamp(q, 0.1, 18);
            };

            const freq = resolveFreq();
            const dur = resolveDur();
            const amp = resolveAmp();
            const cutoffHz = resolveCutoffHz();
            const qVal = resolveQ();
            const panVal = clamp(Number(v.pan ?? 0), -1, 1);

            const osc = new OscillatorNode(ctx, { type: 'sawtooth', frequency: freq });
            const filt = new BiquadFilterNode(ctx, { type: 'lowpass', frequency: cutoffHz, Q: qVal });
            const pan = new StereoPannerNode(ctx, { pan: panVal });
            const gain = new GainNode(ctx, { gain: 0.0 });

            // ADSR
            const A = 0.008;
            const D = 0.060;
            const S = 0.22 * amp;
            const R = 0.140;

            gain.gain.setValueAtTime(0.0, time);
            gain.gain.linearRampToValueAtTime(0.32 * amp, time + A);
            gain.gain.linearRampToValueAtTime(S, time + A + D);

            osc.connect(filt);
            filt.connect(pan);
            pan.connect(gain);
            osc.start(time);

            const autoStopT = time + dur;
            try {
                gain.gain.setValueAtTime(gain.gain.value, autoStopT);
                gain.gain.linearRampToValueAtTime(0.0, autoStopT + R);
            } catch (e) {}
            try { osc.stop(autoStopT + R + 0.02); } catch (e) {}

            function stop(t) {
                const tt = Number.isFinite(t) ? t : ctx.currentTime;
                try { gain.gain.cancelScheduledValues(tt); } catch (e) {}
                try { gain.gain.setValueAtTime(gain.gain.value, tt); } catch (e) {}
                try { gain.gain.linearRampToValueAtTime(0.0, tt + R); } catch (e) {}
                try { osc.stop(tt + R + 0.02); } catch (e) {}
            }

            osc.addEventListener('ended', () => {
                try { osc.disconnect(); } catch (e) {}
                try { filt.disconnect(); } catch (e) {}
                try { pan.disconnect(); } catch (e) {}
                try { gain.disconnect(); } catch (e) {}
                if (typeof onended === 'function') onended();
            }, { once: true });

            return { node: gain, stop };
        }, { type: 'synth' });

        window.__pcvStrudelFallbackRegistered = true;
        console.log('[Strudel] fallback registered: gm_lead_6_voice');
    } catch (e) {
        console.warn('[Strudel] failed to register fallback sound:', e);
    }
}
async function waitForStrudelGlobals(timeoutMs = 9000) {
    const t0 = performance.now();
    while ((performance.now() - t0) < timeoutMs) {
        if (typeof window.evaluate === 'function') return true;
        if (typeof window.setcps === 'function') return true;

        const hasCoreFns =
            (typeof window.note === 'function') ||
            (typeof window.n === 'function') ||
            (typeof window.s === 'function');

        // Some tracks don't use setcps at all, so after a short grace period,
        // accept "core functions exist" as "ready enough".
        if (hasCoreFns && (performance.now() - t0) > 1200) return true;

        await _strudelSleep(40);
    }
    return false;
}

                    // Flicker 1: bass trigger, point's own saturated color
                    if (flickerFade > 0.01) {
                        float h1 = fract(sin(dot(position.xyz, vec3(12.9898, 78.233, 45.164)) + flickerSeed) * 43758.5453);

                            vFlicker = flickerFade;
                            vFlickerColor = clamp(color * 2.0 + vec3(0.1), 0.0, 1.5);
                        }
                    }
                    // Flicker 2: mid trigger
                    if (flicker2Fade > 0.01) {
                        float h2 = fract(sin(dot(position.xyz, vec3(39.346, 11.135, 83.155)) + flicker2Seed) * 43758.5453);
                        if (h2 > flicker2Thresh) {
                            float f2 = flicker2Fade;
                            if (f2 > vFlicker) {
                                vFlicker = f2;
                                vFlickerColor = flicker2Color;
                            }
                        }
                    }
                    // Flicker 3: high trigger
                    if (flicker3Fade > 0.01) {
                        float h3 = fract(sin(dot(position.xyz, vec3(73.156, 52.235, 9.151)) + flicker3Seed) * 43758.5453);
                        if (h3 > flicker3Thresh) {
                            float f3 = flicker3Fade;
                            if (f3 > vFlicker) {
                                vFlicker = f3;
                                vFlickerColor = flicker3Color;
                            }
                        }

                    helpLiteInfoEl.textContent = '';
                }
            }
            updatePointsHelpText();
        }

        function applyLiteMode(enabled) {
            liteState.enabled = !!enabled;

            const pc = window.pointCloudMesh;
            const mat = window.pointCloudMaterial;

            if (pc && pc.geometry && pc.geometry.attributes && pc.geometry.attributes.position) {
                const full = liteState.fullCount || pc.geometry.attributes.position.count || 0;
                liteState.fullCount = full;

                if (!liteState.prev && mat && mat.uniforms) {
                    liteState.prev = {
                        pointSize: mat.uniforms.pointSize ? mat.uniforms.pointSize.value : CONFIG.pointSize
                    };
                }

                if (liteState.enabled) {
                    const frac = (CONFIG.liteMode && typeof CONFIG.liteMode.pointFraction === 'number')
                        ? Math.max(0.05, Math.min(1.0, CONFIG.liteMode.pointFraction))
                        : 0.5;
                    const draw = Math.max(1, Math.floor(full * frac));
                    liteState.drawCount = draw;
                    pc.geometry.setDrawRange(0, draw);

                    if (mat && mat.uniforms && liteState.prev) {
                        const mul = (CONFIG.liteMode && typeof CONFIG.liteMode.pointSizeMul === 'number')
                            ? Math.max(0.5, Math.min(4.0, CONFIG.liteMode.pointSizeMul))
                            : 1.35;
                        if (mat.uniforms.pointSize) mat.uniforms.pointSize.value = liteState.prev.pointSize * mul;
                    }
                } else {
                    liteState.drawCount = full;
                    pc.geometry.setDrawRange(0, full);

                    if (mat && mat.uniforms && liteState.prev) {
                        if (mat.uniforms.pointSize) mat.uniforms.pointSize.value = liteState.prev.pointSize;
                    }
                }
            }

            updatePointsHelpText();
            updateLiteHelpUI();
        }

function updateAudioHelpUI() {
            if (!helpAudioToggleEl) return;
            if (!audioState.enabled) {
                helpAudioToggleEl.textContent = 'audio: off';
                return;
            }
            const src = audioState.source || 'on';
            helpAudioToggleEl.textContent = (src === 'mic') ? 'audio: mic' : (src === 'strudel' ? 'audio: strudel' : 'audio: on');
        }

        async function setAudioReactiveEnabled(enabled) {
            const sourcePref = (CONFIG.audioReactive && CONFIG.audioReactive.source)
                ? CONFIG.audioReactive.source
                : 'mic';

            if (sourcePref !== 'strudel') {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    console.warn('getUserMedia is not available in this browser');
                    return;
                }
            }
if (!enabled) {
                audioState.enabled = false;
                audioState.source = null;
                updateAudioHelpUI();
                if (helpAudioLevelEl) helpAudioLevelEl.textContent = '';
                try {
                    if (audioState.stream) {
                        audioState.stream.getTracks().forEach(t => t.stop());
                    }
                } catch (e) {}
                try {
                    if (audioState.ctx && audioState.ctx.state !== 'closed') {
                        await audioState.ctx.close();
                    }
                } catch (e) {}
                audioState.ctx = null;
                audioState.analyser = null;
                audioState.freq = null;
                audioState.stream = null;
                audioState.level = 0;
                audioState.bands = null;
                if (window.pointCloudMaterial && window.pointCloudMaterial.uniforms.audioLevel) {
                    window.pointCloudMaterial.uniforms.audioLevel.value = 0.0;
                }
                return;
            }

            // Strudel source: use analyser created by .analyze(STRUDEL_ANALYSER_ID)
            if (sourcePref === 'strudel') {
                const analyser = (window.analysers && window.analysers[STRUDEL_ANALYSER_ID]) ? window.analysers[STRUDEL_ANALYSER_ID] : null;
                if (!analyser) {
                    audioState.enabled = false;
                    audioState.source = null;
                    updateAudioHelpUI();
                    if (helpAudioLevelEl) helpAudioLevelEl.textContent = 'strudel: no analyser';
                    return;
                }

                try {
                    analyser.fftSize = (CONFIG.audioReactive && CONFIG.audioReactive.fftSize) ? CONFIG.audioReactive.fftSize : analyser.fftSize;
                    analyser.smoothingTimeConstant = (CONFIG.audioReactive && typeof CONFIG.audioReactive.smoothing === 'number') ? CONFIG.audioReactive.smoothing : analyser.smoothingTimeConstant;
                } catch (e) {}

                audioState.enabled = true;
                audioState.source = 'strudel';
                audioState.ctx = null;
                audioState.analyser = analyser;
                audioState.freq = new Uint8Array(analyser.frequencyBinCount);
                audioState.stream = null;
                audioState.level = 0;
                audioState.sampleRate = (analyser.context && analyser.context.sampleRate) ? analyser.context.sampleRate : audioState.sampleRate;
                const bandsCount = (CONFIG.audioReactive && CONFIG.audioReactive.bands) ? CONFIG.audioReactive.bands : 8;
                audioState.bands = new Float32Array(bandsCount);

                updateAudioHelpUI();
                if (helpAudioLevelEl) helpAudioLevelEl.textContent = 'strudel: active';
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                const srcNode = ctx.createMediaStreamSource(stream);
                const analyser = ctx.createAnalyser();
                analyser.fftSize = 8192;
                analyser.smoothingTimeConstant = 0;
                srcNode.connect(analyser);

                audioState.enabled = true;
                audioState.source = 'mic';
                audioState.ctx = ctx;
                audioState.analyser = analyser;
                audioState.freq = new Uint8Array(analyser.frequencyBinCount);
                audioState.stream = stream;
                audioState.level = 0;
                audioState.sampleRate = ctx.sampleRate || audioState.sampleRate;
                audioState.sampleRate = ctx.sampleRate || audioState.sampleRate;
                const bandsCount = (CONFIG.audioReactive && CONFIG.audioReactive.bands) ? CONFIG.audioReactive.bands : 8;
                audioState.bands = new Float32Array(bandsCount);

                updateAudioHelpUI();
                if (helpAudioLevelEl) helpAudioLevelEl.textContent = 'mic: active';
            } catch (err) {
                console.warn('Audio reactive failed:', err);
                audioState.enabled = false;
                updateAudioHelpUI();
                if (helpAudioLevelEl) helpAudioLevelEl.textContent = 'mic: denied';
            }
        }


        // ============================================
        // AUDIO DRIVER SYSTEM
        // ============================================

        // Raw frequency bands (Hz ranges)
        const BAND_RANGES = [
            [20, 60],       // 0: sub
            [60, 250],      // 1: bass
            [250, 500],     // 2: low-mid
            [500, 2000],    // 3: mid
            [2000, 4000],   // 4: hi-mid
            [4000, 6000],   // 5: presence
            [6000, 12000],  // 6: brilliance
            [12000, 20000]  // 7: air
        ];

        // Driver state — all outputs available to effects
        const audioDrivers = {
            raw: new Float32Array(8),
            bass: 0, mid: 0, high: 0, air: 0,
            energy: 0,
            _prevBass: 0
        };
        window.audioDrivers = audioDrivers;

        function updateAudioDrivers(nowMs) {
            if (!audioState.enabled || !audioState.analyser || !audioState.freq) return;

            const analyser = audioState.analyser;
            const buf = audioState.freq;
            const sr = audioState.sampleRate || 48000;
            const hzPerBin = sr / analyser.fftSize;
            const cfg = CONFIG.audioReactive.drivers || {};
            const gain = CONFIG.audioReactive.sensitivity || 1.0;

            // --- Layer 1: Raw 8 bands from getByteFrequencyData ---
            analyser.getByteFrequencyData(buf);

            for (let b = 0; b < Math.min(8, BAND_RANGES.length); b++) {
                const [fLow, fHigh] = BAND_RANGES[b];
                const binLow = Math.max(1, Math.floor(fLow / hzPerBin));
                const binHigh = Math.min(buf.length - 1, Math.ceil(fHigh / hzPerBin));
                let peak = 0;
                for (let i = binLow; i <= binHigh; i++) {
                    if (buf[i] > peak) peak = buf[i];
                }
                audioDrivers.raw[b] = Math.min(1.0, (peak / 255.0) * gain);
            }

            // Also write to audioState.bands for backward compat
            if (audioState.bands) {
                for (let i = 0; i < Math.min(audioState.bands.length, 8); i++) {
                    audioState.bands[i] = audioDrivers.raw[i];
                }
            }

            // --- Layer 2: Grouped bands with attack/decay ---
            const groups = cfg.groups || { bass: [0,1], mid: [2,3,4], high: [5,6], air: [7] };
            const attackMs = cfg.attackMs || 5;
            const decayMs = cfg.decayMs || 180;
            const dt = 16.67; // ~60fps frame time

            const attackAlpha = Math.min(1.0, dt / Math.max(1, attackMs));
            const decayAlpha = Math.min(1.0, dt / Math.max(1, decayMs));

            function groupPeak(indices) {
                let p = 0;
                for (const i of indices) {
                    if (audioDrivers.raw[i] > p) p = audioDrivers.raw[i];
                }
                return p;
            }

            function applyAD(current, target) {
                if (target > current) {
                    return current + (target - current) * attackAlpha;
                } else {
                    return current + (target - current) * decayAlpha;
                }
            }

            audioDrivers.bass = applyAD(audioDrivers.bass, groupPeak(groups.bass || [0,1]));
            audioDrivers.mid = applyAD(audioDrivers.mid, groupPeak(groups.mid || [2,3,4]));
            audioDrivers.high = applyAD(audioDrivers.high, groupPeak(groups.high || [5,6]));
            audioDrivers.air = applyAD(audioDrivers.air, groupPeak(groups.air || [7]));

            // Noise gate per band (high/air are naturally quieter)
            if (audioDrivers.bass < 0.15) audioDrivers.bass = 0;
            if (audioDrivers.mid < 0.15) audioDrivers.mid = 0;
            if (audioDrivers.high < 0.06) audioDrivers.high = 0;
            if (audioDrivers.air < 0.04) audioDrivers.air = 0;
            audioDrivers.energy = (audioDrivers.bass + audioDrivers.mid + audioDrivers.high + audioDrivers.air) / 4.0;

            // Update audioState.level for backward compat
            audioState.level = audioDrivers.energy;
        }

        // Old function name kept for compat
        function sampleAudioLevel() {
            updateAudioDrivers(performance.now());
            return audioDrivers.energy;
        }

        if (helpAudioToggleEl) {
            updateAudioHelpUI();
            helpAudioToggleEl.addEventListener('click', async () => {
                const next = !audioState.enabled;
                await setAudioReactiveEnabled(next);
                if (typeof updateAudioReactiveCornerBtn === 'function') updateAudioReactiveCornerBtn();
                // Show/hide gain slider
                const gainRow = document.getElementById('help-audio-gain-row');
                if (gainRow) gainRow.style.display = audioState.enabled ? 'flex' : 'none';
            });
        }

        // Gain slider
        const gainSlider = document.getElementById('help-audio-gain');
        const gainValEl = document.getElementById('help-audio-gain-val');
        if (gainSlider) {
            gainSlider.value = String(CONFIG.audioReactive.sensitivity);
            if (gainValEl) gainValEl.textContent = gainSlider.value + '×';
            gainSlider.addEventListener('input', () => {
                const v = parseFloat(gainSlider.value) || 1;
                CONFIG.audioReactive.sensitivity = v;
                if (gainValEl) gainValEl.textContent = v + '×';
            });
        }

        // Audio FX toggles
        const audioFxState = {
            scan1: true,
            scan2: true,
            pulse: true,
            flicker1: true,
            flicker2: true,
            flicker3: true
        };
        window.audioFxState = audioFxState;

        document.querySelectorAll('.audio-fx-btn').forEach(btn => {
            const fx = btn.dataset.fx;
            const updateBtn = () => {
                const on = audioFxState[fx];
                btn.style.background = on ? 'rgba(100,255,160,0.15)' : 'rgba(255,255,255,0.05)';
                btn.style.borderColor = on ? 'rgba(100,255,160,0.5)' : 'rgba(255,255,255,0.15)';
                btn.style.opacity = on ? '1' : '0.4';
